  <line x1="765" y1="197" x2="790" y2="197" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Step 4: Scan Image (Trivy) -->
  <rect x="790" y="175" width="170" height="44" rx="10" fill="transparent" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="790" cy="197" r="5" fill="#22c55e"/>
  <text x="814" y="194" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">🛡 4. Scan Image (Trivy)</text>
