  <text x="199" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Gemini</text>
  <rect x="234" y="386" width="54" height="22" rx="4" fill="transparent" stroke="#475569" stroke-width="1"/>
  <text x="261" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">OpenAI</text>
