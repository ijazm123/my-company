  <text x="497" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">CI #43</text>

  <text x="536" y="401" font-family="Arial, sans-serif" font-size="14" fill="#475569">×</text>

  <!-- ===== AI DEBUG CONTENT ===== -->
  <rect x="20" y="424" width="1460" height="310" rx="10" fill="#0d1224" stroke="#1e293b" stroke-width="1"/>

  <!-- Gemini icon + message -->
  <circle cx="50" cy="460" r="14" fill="#1e3a5f"/>
  <text x="50" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22c55e">✦</text>

  <text x="76" y="464" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">Here's the analysis of the failed Jenkins CI/CD pipeline:</text>

  <!-- Horizontal rule -->
  <line x1="76" y1="480" x2="1440" y2="480" stroke="#1e293b" stroke-width="1"/>

  <!-- Root Cause -->
  <text x="90" y="510" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">1.</text>
  <text x="110" y="510" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">ROOT CAUSE:</text>

  <text x="110" y="536" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">The pipeline failed because the "5. AI Security Gate (Gemini)" stage detected a</text>
  <text x="714" y="536" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">CRITICAL</text>
  <text x="782" y="536" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">vulnerability in the</text>
  <text x="110" y="558" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`morgan`</text>
  <text x="170" y="558" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Node.js package, specifically</text>
  <text x="385" y="558" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`CVE-2019-5413`</text>
  <text x="503" y="558" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">. The security gate is configured to block builds when</text>
  <text x="110" y="580" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">critical vulnerabilities are found, as indicated by the log message:</text>
  <text x="544" y="580" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`🚫 AI Security Gate: BLOCK - 1 CRITICAL</text>
  <text x="110" y="602" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">vulnerabilities found`</text>
  <text x="280" y="602" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">. The `trivy` scan identified `morgan` version `1.9.0` as vulnerable, with a fix available in</text>
  <text x="110" y="624" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">version</text>
  <text x="160" y="624" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`1.9.1`</text>
  <text x="204" y="624" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">.</text>

  <!-- Fix -->
  <text x="90" y="660" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">2.</text>
  <text x="110" y="660" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">FIX:</text>

  <text x="110" y="686" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Update the</text>
  <text x="188" y="686" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`morgan`</text>
  <text x="248" y="686" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Node.js package in your application's</text>
  <text x="502" y="686" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`package.json`</text>
  <text x="598" y="686" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">to version</text>
  <text x="670" y="686" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff">`1.</text>

  <!-- ===== MESSAGE INPUT ===== -->
  <rect x="20" y="742" width="1460" height="30" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="40" y="762" font-family="Arial, sans-serif" font-size="12" fill="#475569">Message Gemini...</text>
  <rect x="1444" y="746" width="28" height="22" rx="6" fill="#2563eb"/>
  <text x="1458" y="762" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">↑</text>
</svg>