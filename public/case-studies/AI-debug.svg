  <text x="1380" y="194" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">✨ Declarative: Post Ac...</text>
  <text x="1460" y="194" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">✓</text>
  <text x="1380" y="212" font-family="Arial, sans-serif" font-size="9" fill="#475569">⏱ 896ms</text>

  <!-- ===== AI DEBUG PANEL ===== -->
