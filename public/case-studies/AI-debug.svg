  <circle cx="960" cy="197" r="5" fill="#22c55e"/>

  <line x1="965" y1="197" x2="990" y2="197" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Step 5: AI Security Gate - FAILED -->
  <rect x="990" y="175" width="160" height="44" rx="10" fill="transparent" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="990" cy="197" r="5" fill="#ef4444"/>
  <text x="1014" y="194" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">🤖 5. AI Security Gate</text>
