<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grid)"/>

  <!-- ===== STEP PALETTE MODAL (Left Side) ===== -->
  <rect x="30" y="30" width="520" height="640" rx="16" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Modal header -->
  <rect x="30" y="30" width="520" height="50" rx="16" fill="#f8fafc"/>
  <rect x="30" y="64" width="520" height="16" fill="#f8fafc"/>
  <line x1="30" y1="80" x2="550" y2="80" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="62" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Insert Step at Position 2</text>
  <text x="520" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">✕</text>

  <!-- ===== BUILD Category ===== -->
  <rect x="50" y="92" width="230" height="28" rx="4" fill="#eef2ff"/>
  <text x="60" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5" letter-spacing="1">BUILD</text>

  <!-- Jenkins Build card -->
  <rect x="50" y="128" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="50" y="128" width="230" height="72" rx="10" fill="none" stroke="#818cf8" stroke-width="2" opacity="0"/>
  <rect x="62" y="140" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="82" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🔨</text>
  <text x="114" y="157" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Build</text>
  <text x="114" y="174" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">Jenkins CI/CD</text>

  <!-- Script card -->
  <rect x="50" y="210" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="62" y="222" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="82" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">⚡</text>
  <text x="114" y="239" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Script</text>
  <text x="114" y="256" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">Command-line execution</text>

  <!-- ===== SECURITY Category ===== -->
  <rect x="300" y="92" width="230" height="28" rx="4" fill="#fef2f2"/>
  <text x="310" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626" letter-spacing="1">SECURITY</text>

  <!-- Code Scan card -->
  <rect x="300" y="128" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="300" y="128" width="230" height="72" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/>
  <rect x="312" y="140" width="40" height="40" rx="8" fill="#e0e7ff"/>
  <text x="332" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🔍</text>
  <text x="364" y="157" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Code Scan</text>
  <text x="364" y="174" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">SonarQube analysis</text>

  <!-- Compliance card -->
  <rect x="300" y="210" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="312" y="222" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="332" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🛡️</text>
  <text x="364" y="239" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Compliance</text>
  <text x="364" y="256" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">GitScraper secrets scan</text>

  <!-- Container Scan card -->
  <rect x="300" y="292" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="312" y="304" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="332" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🐳</text>
  <text x="364" y="321" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Container Scan</text>
  <text x="364" y="338" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">Wiz vulnerability scan</text>

  <!-- ===== DELIVERY Category ===== -->
  <rect x="50" y="300" width="230" height="28" rx="4" fill="#f0fdf4"/>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#16a34a" letter-spacing="1">DELIVERY</text>

  <!-- Publish card -->
  <rect x="50" y="338" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="62" y="350" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="82" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">📦</text>
  <text x="114" y="367" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Publish</text>
  <text x="114" y="384" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">JFrog Artifactory</text>

  <!-- Deploy card -->
  <rect x="50" y="420" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="62" y="432" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="82" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🚀</text>
  <text x="114" y="449" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Deploy</text>
  <text x="114" y="466" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">ArgoCD GitOps</text>

  <!-- ===== FLOW Category ===== -->
  <rect x="300" y="382" width="230" height="28" rx="4" fill="#fffbeb"/>
  <text x="310" y="402" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d97706" letter-spacing="1">FLOW</text>

  <!-- Approval card -->
  <rect x="300" y="420" width="230" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="312" y="432" width="40" height="40" rx="8" fill="#f1f5f9"/>
  <text x="332" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">✋</text>
  <text x="364" y="449" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Manual Approval</text>
  <text x="364" y="466" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">Gate / checkpoint</text>

  <!-- Footer label -->
  <text x="290" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">8 step types across 4 categories — click to insert</text>

  <!-- ===== RIGHT SIDE: Execution View ===== -->

  <!-- Title -->
  <text x="880" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f1f5f9">Pipeline Execution — DAG View</text>
  <line x1="700" y1="68" x2="1060" y2="68" stroke="url(#indigoGrad)" stroke-width="2"/>

  <!-- Execution status bar -->
  <rect x="620" y="82" width="540" height="36" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="644" cy="100" r="6" fill="#22c55e" filter="url(#glowGreen)"/>
  <text x="660" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">Running</text>
  <text x="730" y="105" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Pipeline: My CI/CD Pipeline</text>
  <text x="1020" y="105" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Step 3/5</text>
  <rect x="1070" y="88" width="70" height="24" rx="5" fill="#ef4444" opacity="0.9"/>
  <text x="1105" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">■ Abort</text>

  <!-- ===== VERTICAL DAG FLOW ===== -->

  <!-- Start node (completed) -->
  <rect x="810" y="132" width="140" height="50" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="835" y="155" font-family="Arial, sans-serif" font-size="16">🚩</text>
  <text x="858" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Start</text>
  <text x="858" y="170" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">✓ Complete</text>
  <!-- Checkmark -->
  <circle cx="930" cy="157" r="10" fill="#22c55e"/>
  <text x="930" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">✓</text>

  <!-- Connector -->
  <line x1="880" y1="182" x2="880" y2="210" stroke="#22c55e" stroke-width="2"/>
  <polygon points="875,207 885,207 880,214" fill="#22c55e"/>

  <!-- Build step (completed) -->
  <rect x="810" y="214" width="140" height="50" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="835" y="237" font-family="Arial, sans-serif" font-size="16">🔨</text>
  <text x="858" y="237" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Docker Build</text>
  <text x="858" y="252" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">✓ 2m 14s</text>
  <circle cx="930" cy="239" r="10" fill="#22c55e"/>
  <text x="930" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">✓</text>

  <!-- Connector splits into parallel -->
  <line x1="880" y1="264" x2="880" y2="286" stroke="#22c55e" stroke-width="2"/>

  <!-- Parallel indicator -->
  <rect x="830" y="286" width="100" height="20" rx="4" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="880" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#818cf8">⇅ PARALLEL</text>

  <!-- Fork lines -->
  <line x1="880" y1="306" x2="780" y2="330" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="880" y1="306" x2="980" y2="330" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Code Scan (running - left parallel) -->
  <rect x="700" y="330" width="160" height="55" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="725" y="355" font-family="Arial, sans-serif" font-size="16">🔍</text>
  <text x="748" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Code Scan</text>
  <text x="748" y="372" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">⟳ Running 0:45</text>
  <!-- Spinner -->
  <circle cx="838" cy="357" r="10" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="15,48" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 838 357" to="360 838 357" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Container Scan (running - right parallel) -->
  <rect x="900" y="330" width="160" height="55" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="925" y="355" font-family="Arial, sans-serif" font-size="16">🐳</text>
  <text x="948" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Container Scan</text>
  <text x="948" y="372" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">⟳ Running 0:32</text>
  <circle cx="1038" cy="357" r="10" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="15,48" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 1038 357" to="360 1038 357" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Merge lines -->
  <line x1="780" y1="385" x2="880" y2="415" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="980" y1="385" x2="880" y2="415" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Approval (pending) -->
  <rect x="810" y="415" width="140" height="50" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="835" y="438" font-family="Arial, sans-serif" font-size="16">✋</text>
  <text x="858" y="438" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b">Approval</text>
  <text x="858" y="453" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Pending</text>

  <!-- Connector -->
  <line x1="880" y1="465" x2="880" y2="490" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Deploy (pending) -->
  <rect x="810" y="490" width="140" height="50" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="835" y="513" font-family="Arial, sans-serif" font-size="16">🚀</text>
  <text x="858" y="513" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b">Deploy Prod</text>
  <text x="858" y="528" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Pending</text>

  <!-- ===== Legend ===== -->
  <rect x="640" y="570" width="480" height="90" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="660" y="594" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="2">LEGEND</text>

  <circle cx="670" cy="616" r="6" fill="#22c55e"/>
  <text x="684" y="620" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Completed</text>

  <circle cx="770" cy="616" r="6" fill="#f59e0b"/>
  <text x="784" y="620" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Running</text>

  <circle cx="860" cy="616" r="6" fill="#475569"/>
  <text x="874" y="620" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Pending</text>

  <circle cx="950" cy="616" r="6" fill="#ef4444"/>
  <text x="964" y="620" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Failed</text>

  <rect x="1030" y="610" width="50" height="12" rx="3" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="1055" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#818cf8">PARALLEL</text>

  <text x="660" y="646" font-family="Arial, sans-serif" font-size="10" fill="#64748b">DAG engine executes independent steps in parallel via asyncio.gather — 10 integrated tool connections</text>
</svg>