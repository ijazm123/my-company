<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grid)"/>

  <!-- ===== TOP TOOLBAR ===== -->
  <rect x="0" y="0" width="1200" height="52" fill="#ffffff" opacity="0.97"/>
  <line x1="0" y1="52" x2="1200" y2="52" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Back arrow -->
  <text x="20" y="32" font-family="Arial, sans-serif" font-size="18" fill="#64748b">←</text>

  <!-- Pipeline name -->
  <text x="50" y="33" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">My CI/CD Pipeline</text>

  <!-- Toolbar buttons -->
  <rect x="260" y="12" width="120" height="30" rx="6" fill="url(#indigoGrad)" filter="url(#shadow)"/>
  <text x="320" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">+ Add New Step</text>

  <rect x="392" y="12" width="100" height="30" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="442" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#374151">☑ Bulk Actions</text>

  <rect x="504" y="12" width="105" height="30" rx="6" fill="url(#indigoGrad)" filter="url(#shadow)"/>
  <text x="556" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">📄 View Config</text>

  <rect x="620" y="12" width="70" height="30" rx="6" fill="url(#indigoGrad)" filter="url(#shadow)"/>
  <text x="655" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">🔧 Tools</text>

  <rect x="702" y="12" width="82" height="30" rx="6" fill="url(#indigoGrad)" filter="url(#shadow)"/>
  <text x="743" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">◆ Export Git</text>

  <rect x="796" y="12" width="64" height="30" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="828" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">💾 Save</text>

  <rect x="872" y="12" width="64" height="30" rx="6" fill="url(#amberGrad)" filter="url(#shadow)"/>
  <text x="904" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">▶ Run</text>

  <rect x="948" y="12" width="80" height="30" rx="6" fill="url(#indigoGrad)" filter="url(#shadow)"/>
  <text x="988" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">📊 History</text>

  <rect x="1040" y="12" width="100" height="30" rx="6" fill="#4f46e5" filter="url(#shadow)"/>
  <text x="1090" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">→ Horizontal</text>

  <!-- ===== MAIN CANVAS ===== -->
  <!-- Canvas area -->
  <rect x="0" y="52" width="780" height="648" fill="#0f172a"/>

  <!-- ===== START NODE ===== -->
  <rect x="30" y="220" width="160" height="160" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Selected highlight -->
  <rect x="30" y="220" width="160" height="160" rx="12" fill="none" stroke="#818cf8" stroke-width="2"/>

  <!-- Start icon box -->
  <rect x="42" y="232" width="36" height="36" rx="8" fill="#1e293b"/>
  <text x="60" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">🚩</text>
  <text x="88" y="248" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">Start</text>
  <text x="88" y="262" font-family="Arial, sans-serif" font-size="10" fill="#818cf8">start</text>

  <line x1="42" y1="275" x2="178" y2="275" stroke="#334155" stroke-width="0.5"/>

  <text x="50" y="294" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">myorg/web-app</text>
  <text x="50" y="308" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Repository</text>

  <text x="50" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">main</text>
  <text x="50" y="344" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Branch</text>

  <text x="50" y="366" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Manual</text>
  <text x="50" y="378" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Trigger</text>

  <!-- ===== CONNECTOR 1 ===== -->
  <line x1="190" y1="300" x2="238" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="214" cy="300" r="13" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="214" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">+</text>

  <!-- ===== BUILD STEP ===== -->
  <rect x="238" y="220" width="160" height="160" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="250" y="232" width="36" height="36" rx="8" fill="#1e293b"/>
  <text x="268" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">🔨</text>
  <text x="296" y="248" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">Docker Build</text>
  <text x="296" y="262" font-family="Arial, sans-serif" font-size="10" fill="#818cf8">build</text>

  <line x1="250" y1="275" x2="386" y2="275" stroke="#334155" stroke-width="0.5"/>

  <text x="258" y="294" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Jenkins CI</text>
  <text x="258" y="308" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Tool</text>

  <text x="258" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">myapp:latest</text>
  <text x="258" y="344" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Docker Image</text>

  <text x="258" y="366" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">./Dockerfile</text>
  <text x="258" y="378" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Dockerfile</text>

  <!-- ===== CONNECTOR 2 ===== -->
  <line x1="398" y1="300" x2="446" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="422" cy="300" r="13" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="422" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">+</text>

  <!-- ===== SCAN STEP ===== -->
  <rect x="446" y="220" width="160" height="160" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="458" y="232" width="36" height="36" rx="8" fill="#1e293b"/>
  <text x="476" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">�</text>
  <text x="504" y="248" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">Image Scan</text>
  <text x="504" y="262" font-family="Arial, sans-serif" font-size="10" fill="#818cf8">security</text>

  <line x1="458" y1="275" x2="594" y2="275" stroke="#334155" stroke-width="0.5"/>

  <text x="466" y="294" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">Trivy</text>
  <text x="466" y="308" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Tool</text>

  <text x="466" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">my-app:latest</text>
  <text x="466" y="344" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Docker Image</text>

  <text x="466" y="366" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">HIGH,CRITICAL</text>
  <text x="466" y="378" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Severity Threshold</text>

  <!-- ===== CONNECTOR 3 ===== -->
  <line x1="606" y1="300" x2="654" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="630" cy="300" r="13" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="630" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">+</text>

  <!-- ===== DEPLOY STEP ===== -->
  <rect x="654" y="220" width="160" height="160" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="666" y="232" width="36" height="36" rx="8" fill="#1e293b"/>
  <text x="684" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">🚀</text>
  <text x="712" y="248" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">Deploy Prod</text>
  <text x="712" y="262" font-family="Arial, sans-serif" font-size="10" fill="#818cf8">deploy</text>

  <line x1="666" y1="275" x2="802" y2="275" stroke="#334155" stroke-width="0.5"/>

  <text x="674" y="294" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">ArgoCD</text>
  <text x="674" y="308" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Tool</text>

  <text x="674" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">web-app-prod</text>
  <text x="674" y="344" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">ArgoCD App</text>

  <text x="674" y="366" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0">✓ Helm chart</text>
  <text x="674" y="378" font-family="Arial, sans-serif" font-size="9" fill="#818cf8">Deploy Method</text>

  <!-- ===== RIGHT SIDE PANEL ===== -->
  <rect x="780" y="52" width="420" height="648" fill="#ffffff"/>
  <line x1="780" y1="52" x2="780" y2="700" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Panel header -->
  <rect x="780" y="52" width="420" height="50" fill="#f8fafc"/>
  <line x1="780" y1="102" x2="1200" y2="102" stroke="#e2e8f0" stroke-width="1"/>
  <text x="800" y="83" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1e293b">Configure: Docker Build</text>
  <text x="1170" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">✕</text>

  <!-- Step Name field -->
  <text x="800" y="130" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Step Name</text>
  <rect x="800" y="136" width="380" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="812" y="157" font-family="Arial, sans-serif" font-size="12" fill="#374151">Docker Build</text>

  <!-- Description field -->
  <text x="800" y="186" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Description</text>
  <rect x="800" y="192" width="380" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="812" y="213" font-family="Arial, sans-serif" font-size="12" fill="#374151">Build Docker image via Jenkins</text>

  <!-- Step Type & Tool dropdowns -->
  <text x="800" y="242" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Step Type</text>
  <rect x="800" y="248" width="180" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="812" y="269" font-family="Arial, sans-serif" font-size="12" fill="#374151">Build</text>
  <text x="968" y="269" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">▼</text>

  <text x="995" y="242" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Tool</text>
  <rect x="995" y="248" width="185" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="1007" y="269" font-family="Arial, sans-serif" font-size="12" fill="#374151">Jenkins</text>
  <text x="1168" y="269" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">▼</text>

  <!-- Dependencies -->
  <text x="800" y="300" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Dependencies (runs after)</text>
  <rect x="800" y="306" width="380" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <rect x="812" y="312" width="60" height="20" rx="4" fill="#eef2ff" stroke="#818cf8" stroke-width="0.5"/>
  <text x="842" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6366f1">Start ✕</text>

  <!-- Active checkbox -->
  <rect x="800" y="350" width="16" height="16" rx="3" fill="#6366f1"/>
  <text x="808" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">✓</text>
  <text x="824" y="363" font-family="Arial, sans-serif" font-size="12" fill="#374151">Active</text>

  <!-- Separator -->
  <line x1="800" y1="378" x2="1180" y2="378" stroke="#e2e8f0" stroke-width="1"/>
  <text x="800" y="398" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b" letter-spacing="2">CONFIGURATION</text>

  <!-- Jenkins Connection -->
  <text x="800" y="424" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">🔧 Jenkins Connection</text>
  <rect x="800" y="430" width="300" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="816" cy="446" r="5" fill="#22c55e"/>
  <text x="828" y="451" font-family="Arial, sans-serif" font-size="12" fill="#374151">Jenkins CI (connected)</text>
  <rect x="1110" y="430" width="70" height="32" rx="6" fill="#eef2ff" stroke="#818cf8" stroke-width="1"/>
  <text x="1145" y="451" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6366f1">+ Connect</text>

  <!-- Build Type -->
  <text x="800" y="482" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Build Type</text>
  <rect x="800" y="488" width="380" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="812" y="509" font-family="Arial, sans-serif" font-size="12" fill="#374151">Docker</text>
  <text x="1168" y="509" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">▼</text>

  <!-- Docker Image Name -->
  <text x="800" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Docker Image Name</text>
  <rect x="800" y="546" width="380" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="812" y="567" font-family="Arial, sans-serif" font-size="12" fill="#374151">myapp</text>

  <!-- Collapsible sections -->
  <text x="800" y="600" font-family="Arial, sans-serif" font-size="12" fill="#64748b">▸ Dynamic Naming &amp; Tagging</text>
  <text x="800" y="622" font-family="Arial, sans-serif" font-size="12" fill="#64748b">▸ Agent &amp; Workspace</text>
  <text x="800" y="644" font-family="Arial, sans-serif" font-size="12" fill="#64748b">▸ Advanced — Shell Commands</text>

  <!-- Jenkins Job section -->
  <line x1="800" y1="658" x2="1180" y2="658" stroke="#e2e8f0" stroke-width="1"/>
  <text x="800" y="678" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">🔧 JENKINS JOB CONFIGURATION</text>

  <!-- Delete button -->
  <rect x="800" y="685" width="380" height="3" rx="1" fill="#ef4444" opacity="0.3"/>

  <!-- Canvas label -->
  <text x="390" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Drag-and-drop workflow canvas with horizontal DAG layout</text>

  <!-- Flow direction indicator -->
  <text x="110" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#818cf8" font-weight="bold">START</text>
  <line x1="60" y1="202" x2="160" y2="202" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="155,199 162,202 155,205" fill="#818cf8"/>
</svg>