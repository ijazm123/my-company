  <text x="348" y="118" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">, </text>
  <text x="356" y="118" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-decoration="underline">events</text>
  <text x="396" y="118" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">, </text>
  <text x="404" y="118" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-decoration="underline">version</text>
