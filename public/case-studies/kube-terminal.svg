  <text x="72" y="29" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">ecommerce-platform</text>

  <!-- Nav tabs -->
  <text x="230" y="29" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">📋 Pipeline</text>
